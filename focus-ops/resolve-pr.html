<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Resolve PR</title><style>body{font-family:system-ui;background:#07070b;color:#f7f1df;margin:0}main{max-width:760px;margin:25px auto;padding:16px}.card{background:#11131d;border:1px solid #3a321d;border-radius:20px;padding:20px}input,button{box-sizing:border-box;width:100%;padding:13px;margin:8px 0 14px;border-radius:12px;border:1px solid #3a321d}input{background:#080a10;color:#f7f1df}button{background:#d7a83f;color:#130d02;font-weight:800}pre{background:#05060a;border:1px solid #3a321d;border-radius:14px;padding:12px;white-space:pre-wrap;word-break:break-word}</style></head><body><main><div class="card"><h1>Resolve PR #7</h1><p>This rebuilds PR #7 on top of current main, opens a clean replacement PR, and merges it.</p><label>Access code</label><input id="access" type="password"><label>Base URL</label><input id="base" placeholder="leave blank for current domain"><button id="run">Resolve conflict and merge</button><pre id="out">Ready.</pre></div></main><script>const o=document.getElementById('out');const v=id=>document.getElementById(id);const base=()=>((v('base').value||location.origin).replace(/\/$/,''));function log(a,b){o.textContent+='\n\n'+a+(b?'\n'+(typeof b==='string'?b:JSON.stringify(b,null,2)):'');}async function post(path,body){const r=await fetch(base()+path,{method:'POST',headers:{'content-type':'application/json','x-focus-connector-key':v('access').value.trim()},body:JSON.stringify(body)});const t=await r.text();let j;try{j=JSON.parse(t)}catch{j={raw:t}}if(!r.ok||j.ok===false)throw new Error(JSON.stringify(j));return j;}v('run').onclick=async()=>{try{o.textContent='Resolving...';if(!v('access').value.trim())throw new Error('Access code required');log('result',await post('/api/focus-connector-resolve-pr',{pull_number:7,base:'main',merge_method:'merge'}));log('DONE');}catch(e){log('error',String(e.message||e));}};</script></body></html>
