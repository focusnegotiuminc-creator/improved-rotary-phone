<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Focus Ops</title><style>body{font-family:system-ui;background:#07070b;color:#f7f1df;margin:0}main{max-width:850px;margin:25px auto;padding:16px}.card{background:#11131d;border:1px solid #3a321d;border-radius:20px;padding:20px}input,button{box-sizing:border-box;width:100%;padding:13px;margin:8px 0 14px;border-radius:12px;border:1px solid #3a321d}input{background:#080a10;color:#f7f1df}button{background:#d7a83f;color:#130d02;font-weight:800}pre{background:#05060a;border:1px solid #3a321d;border-radius:14px;padding:12px;white-space:pre-wrap;word-break:break-word}</style></head><body><main><div class="card"><h1>Focus Ops</h1><p>Use this page instead of Zapier Webhooks. It runs from your browser against the deployed connector.</p><label>Access code</label><input id="access" type="password"><label>Base URL</label><input id="base" placeholder="leave blank for current domain"><label>Be Your Menu MP3</label><input id="menu" type="file" accept=".mp3,audio/mpeg"><label>Change Your Life Money MP3</label><input id="money" type="file" accept=".mp3,audio/mpeg"><button id="health">Check health</button><button id="run">Run upload cleanup merge</button><pre id="out">Ready.</pre></div></main><script>const E='focus-command-center-drive-import-2026-06-28';const o=document.getElementById('out');const v=id=>document.getElementById(id);const base=()=>((v('base').value||location.origin).replace(/\/$/,''));function log(a,b){o.textContent+='\n\n'+a+(b?'\n'+JSON.stringify(b,null,2):'');}async function b64(file){return new Promise((ok,no)=>{const r=new FileReader();r.onerror=()=>no(r.error);r.onload=()=>ok(String(r.result).split(',')[1]);r.readAsDataURL(file);});}async function post(path,body){const r=await fetch(base()+path,{method:'POST',headers:{'content-type':'application/json','x-focus-connector-key':v('access').value},body:JSON.stringify(body)});const t=await r.text();let j;try{j=JSON.parse(t)}catch{j={raw:t}}if(!r.ok||j.ok===false)throw new Error(path+' '+JSON.stringify(j));return j;}async function health(){o.textContent='Checking...';const r=await fetch(base()+'/health');const j=await r.json();log('health',j);return j;}v('health').onclick=()=>health().catch(e=>log('error',String(e.message||e)));v('run').onclick=async()=>{try{o.textContent='Starting...';await health();for(const p of ['focus_ai/site/flux-crave/assets/flux-crave/audio/change-your-life-money.mp3','focus_ai/site/flux-crave/assets/audio/change-your-life-money-real.mp3']){try{log('delete '+p,await post('/github/delete-file',{branch:E,path:p,message:'Remove old audio pointer'}));}catch(e){log('skip delete '+p,String(e.message||e));}}log('upload money',await post('/github/upload-binary',{branch:E,path:'focus_ai/site/flux-crave/assets/audio/change-your-life-money.mp3',message:'Upload real audio file',base64:await b64(v('money').files[0])}));log('upload menu',await post('/github/upload-binary',{branch:E,path:'focus_ai/site/flux-crave/assets/audio/be-your-menu.mp3',message:'Upload real audio file',base64:await b64(v('menu').files[0])}));log('merge',await post('/github/merge-pr',{pull_number:7,merge_method:'merge'}));log('DONE');}catch(e){log('error',String(e.message||e));}};</script></body></html>
