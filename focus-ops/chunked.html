<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Focus Chunk Ops</title><style>body{font-family:system-ui;background:#07070b;color:#f7f1df;margin:0}main{max-width:850px;margin:25px auto;padding:16px}.card{background:#11131d;border:1px solid #3a321d;border-radius:20px;padding:20px}input,button{box-sizing:border-box;width:100%;padding:13px;margin:8px 0 14px;border-radius:12px;border:1px solid #3a321d}input{background:#080a10;color:#f7f1df}button{background:#d7a83f;color:#130d02;font-weight:800}pre{background:#05060a;border:1px solid #3a321d;border-radius:14px;padding:12px;white-space:pre-wrap;word-break:break-word}</style></head><body><main><div class="card"><h1>Focus Chunk Ops</h1><p>Use this page when the normal uploader says the MP3 is too large.</p><label>Access code</label><input id="access" type="password"><label>Base URL</label><input id="base" placeholder="leave blank for current domain"><label>Be Your Menu MP3</label><input id="menu" type="file" accept=".mp3,audio/mpeg"><label>Change Your Life Money MP3</label><input id="money" type="file" accept=".mp3,audio/mpeg"><button id="health">Check health</button><button id="run">Run chunk upload cleanup merge</button><pre id="out">Ready.</pre></div></main><script>const BR='focus-command-center-drive-import-2026-06-28';const CH=600000;const o=document.getElementById('out');const v=id=>document.getElementById(id);const base=()=>((v('base').value||location.origin).replace(/\/$/,''));function log(a,b){o.textContent+='\n\n'+a+(b?'\n'+(typeof b==='string'?b:JSON.stringify(b,null,2)):'');o.scrollTop=o.scrollHeight;}function key(){return v('access').value.trim();}async function asB64(blob){return new Promise((ok,no)=>{const r=new FileReader();r.onerror=()=>no(r.error);r.onload=()=>ok(String(r.result).split(',')[1]);r.readAsDataURL(blob);});}async function post(path,body){const r=await fetch(base()+path,{method:'POST',headers:{'content-type':'application/json','x-focus-connector-key':key()},body:JSON.stringify(body)});const t=await r.text();let j;try{j=JSON.parse(t)}catch{j={raw:t}}if(!r.ok||j.ok===false)throw new Error(path+' '+JSON.stringify(j));return j;}async function health(){o.textContent='Checking...';const r=await fetch(base()+'/health');const j=await r.json();log('health',j);if(j.ok!==true)throw new Error('health is not ok');return j;}async function uploadFile(file,targetPath,label){const total=Math.ceil(file.size/CH);const uploadId=label+'-'+Date.now();log('chunking '+label,{size:file.size,total});for(let i=0;i<total;i++){const part=file.slice(i*CH,Math.min(file.size,(i+1)*CH));const base64=await asB64(part);log('sending '+label+' chunk '+(i+1)+'/'+total);await post('/api/focus-connector-upload-chunk',{branch:BR,uploadId,targetPath,index:i,total,base64});}return post('/api/focus-connector-finalize-chunks',{branch:BR,uploadId,targetPath,total,message:'Upload real MP3 binary '+label});}v('health').onclick=()=>health().catch(e=>log('error',String(e.message||e)));v('run').onclick=async()=>{try{o.textContent='Starting...';if(!key())throw new Error('Access code required');if(!v('menu').files[0]||!v('money').files[0])throw new Error('Select both MP3 files');await health();for(const p of ['focus_ai/site/flux-crave/assets/flux-crave/audio/change-your-life-money.mp3','focus_ai/site/flux-crave/assets/audio/change-your-life-money-real.mp3']){try{log('remove '+p,await post('/api/focus-connector-delete-file',{branch:BR,path:p,message:'Remove old audio pointer'}));}catch(e){log('skip remove '+p,String(e.message||e));}}log('upload money result',await uploadFile(v('money').files[0],'focus_ai/site/flux-crave/assets/audio/change-your-life-money.mp3','money'));log('upload menu result',await uploadFile(v('menu').files[0],'focus_ai/site/flux-crave/assets/audio/be-your-menu.mp3','menu'));log('merge result',await post('/api/focus-connector-merge-pr',{pull_number:7,merge_method:'merge'}));log('DONE');}catch(e){log('error',String(e.message||e));}};</script></body></html>
