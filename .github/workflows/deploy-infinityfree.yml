name: Deploy TheFocusCorp Site

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */2 * * *"
  push:
    branches: ["work", "main", "master"]

permissions:
  contents: read

jobs:
  deploy:
    concurrency:
      group: deploy-thefocuscorp-site
      cancel-in-progress: true
    runs-on: ubuntu-latest
    env:
      FOCUS_APP_URL: https://thefocuscorp.com
      FOCUS_APP_PATHS: /,/products.html,/ebooks/index.html,/landing.html
      FOCUS_APP_PATHS: /,/booking.html,/services.html,/products.html,/ebooks/index.html
      FOCUS_REQUIRE_ALL_PATHS: "0"
      FOCUS_SKIP_TLS_VERIFY: "1"
      INFINITYFREE_STRICT: "0"
      INFINITYFREE_FTP_HOST: ${{ secrets.INFINITYFREE_FTP_HOST }}
      INFINITYFREE_FTP_USER: ${{ secrets.INFINITYFREE_FTP_USER }}
      INFINITYFREE_FTP_PASS: ${{ secrets.INFINITYFREE_FTP_PASS }}
      INFINITYFREE_REMOTE_DIR: ${{ secrets.INFINITYFREE_REMOTE_DIR || vars.INFINITYFREE_REMOTE_DIR || 'thefocuscorp.com/htdocs' }}
      INFINITYFREE_REMOTE_DIR_CANDIDATES: ${{ vars.INFINITYFREE_REMOTE_DIR_CANDIDATES || 'thefocuscorp.com/htdocs,htdocs,domains/thefocuscorp.com/public_html' }}
      REPLIT_DEPLOY_HOOK_URL: ${{ secrets.REPLIT_DEPLOY_HOOK_URL }}
      REPLIT_DEPLOY_WEBHOOK_URL: ${{ secrets.REPLIT_DEPLOY_WEBHOOK_URL }}
      REPLIT_DEPLOY_TOKEN: ${{ secrets.REPLIT_DEPLOY_TOKEN }}
      REPLIT_DEPLOY_METHOD: POST
      REPLIT_DEPLOY_TIMEOUT: "30"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build site artifacts
        run: |
          python3 focus_ai/scripts/publish_ebooks.py
          python3 focus_ai/scripts/build_public_site.py

      - name: Trigger Replit deploy (if configured)
        run: python3 focus_ai/scripts/deploy_replit.py

      - name: Deploy to InfinityFree (if configured)
        run: python3 focus_ai/scripts/deploy_infinityfree.py

      - name: Sync WordPress theme (if configured)
        run: python3 focus_ai/scripts/deploy_wordpress_theme.py

      - name: Verify live endpoints
        run: python3 focus_ai/scripts/verify_live_app.py

