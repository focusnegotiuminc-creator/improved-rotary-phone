name: Sacred AI Auto Generator

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run generation engine
        run: python automation/ai_generator.py

      - name: Commit and push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add research claims book geometry construction compliance alignment marketing final_product automation frontend
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: automated sacred AI content refresh"
            git push
          fi
